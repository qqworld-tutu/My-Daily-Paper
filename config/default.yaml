scheduler:
  timezone: Asia/Shanghai
  daily_time: "09:00"
  state_path: "data/state/scheduler_state.json"
ranking:
  ranking_version: v1
  keywords: "transformer,retrieval,diffusion,vision,agent"
  weights:
    interest: 0.65
    freshness: 0.20
    trending: 0.15
  for_you_n: 5
  trending_n: 5
source:
  source_success_mode: strict_both
  arxiv_categories: "cs.AI,cs.LG,cs.CL,cs.CV"
  arxiv_focus_terms: ""
  arxiv_focus_mode: "any"
  hf_fallback_days: 3
fetch:
  max_results_per_source: 50
delivery:
  max_msg_chars: 18000
  max_entries_per_chunk: 8
  webhook_url: ""
  webhook_timeout_sec: 15
summary:
  use_llm: 1
  language: "zh-CN"
  mode: "enhanced"
  enhanced_max_chars: 8000
  api_key: ""
  base_url: ""
  model: "gpt-4o-mini"
